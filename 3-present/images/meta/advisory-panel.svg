  <!-- routing paths from center to 4 -->
  <path d="M320 148 L320 86" stroke="#1E2BFA" stroke-width="2" stroke-opacity="0.55"/>
  <path d="M350 160 L416 122" stroke="#1E2BFA" stroke-width="2" stroke-opacity="0.55"/>
  <path d="M360 190 L440 208" stroke="#1E2BFA" stroke-width="2" stroke-opacity="0.55"/>
