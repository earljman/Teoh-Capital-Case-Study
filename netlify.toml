# Slides at /, SvelteKit demo at /demo
# Production demo routing: dist/_redirects (copied at build time).
# Local dev routing: scripts/dev-server.mjs proxies /demo → Vite.

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "2-build/demo/.netlify/functions-internal"

[dev]
  publish = "dist"
  port = 8888
  framework = "#static"
