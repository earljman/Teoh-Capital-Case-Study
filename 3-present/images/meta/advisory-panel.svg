  <rect x="292" y="162" width="56" height="6" rx="2" fill="#111" fill-opacity="0.7"/>
  <rect x="292" y="176" width="44" height="4" rx="1" fill="#1E2BFA" fill-opacity="0.35"/>
  <rect x="292" y="186" width="50" height="4" rx="1" fill="#111" fill-opacity="0.2"/>
  <!-- ring -->
  <circle cx="320" cy="180" r="110" stroke="#1E2BFA" stroke-opacity="0.18" stroke-width="1.5" stroke-dasharray="4 6"/>
