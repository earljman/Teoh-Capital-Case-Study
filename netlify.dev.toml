# Local dev config:
# - serve deck from dist on /
# - proxy /demo to the Vite dev server for HMR + live styles

[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev:demo"
  publish = "dist"
  targetPort = 5173
  port = 8888

[[redirects]]
  from = "/demo/*"
  to = "http://localhost:5173/demo/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/demo"
  to = "/demo/"
  status = 301
  force = true
