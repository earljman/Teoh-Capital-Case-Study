# Slides at /, SvelteKit demo at /demo
[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "2-build/demo/.netlify/functions-internal"

[[redirects]]
  from = "/demo/*"
  to = "/.netlify/functions/sveltekit-render"
  status = 200

[[redirects]]
  from = "/demo"
  to = "/demo/"
  status = 301

[dev]
  command = "npm run dev --prefix 2-build/demo"
  port = 5173
  targetPort = 5173
