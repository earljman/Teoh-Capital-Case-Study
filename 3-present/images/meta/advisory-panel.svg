    <circle cx="210" cy="110" r="16" fill="#1E2BFA"/><circle cx="210" cy="110" r="6" fill="#FDFAE7"/>
    <!-- others -->
    <circle cx="185" cy="210" r="14" fill="#1E2BFA" fill-opacity="0.18"/>
    <circle cx="230" cy="275" r="14" fill="#1E2BFA" fill-opacity="0.18"/>
    <circle cx="320" cy="295" r="14" fill="#1E2BFA" fill-opacity="0.18"/>
    <circle cx="410" cy="275" r="14" fill="#1E2BFA" fill-opacity="0.18"/>
